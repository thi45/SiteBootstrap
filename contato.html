<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apreendendo bootstrap</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/stilos.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="index.html"
          ><i class="bi bi-house-fill"></i
        ></a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="index.html"
                >Home</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="sobre.html">Informações</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="contato.html">Contato</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container-fluid mt-3">
      <h3>Contato</h3>
      <form class="row g-3">
        <div class="col-md-6">
          <label for="inputEmail4" class="form-label">Nome do Produto</label>
          <input
            type="email"
            class="form-control"
            id="inputEmail4"
            placeholder="Produto1"
          />
        </div>
        <div class="col-md-6">
          <label for="inputPassword4" class="form-label"
            >Categoria do Produto</label
          >
          <select class="form-select" aria-label="Default select example">
            <option selected disabled>Escolha a Categoria</option>
            <option value="1">Vestimenta</option>
            <option value="2">Cosméticos</option>
            <option value="3">Pet</option>
          </select>
        </div>
        <div class="row">
          <div class="col-md-5">
            <label for="inputprice">Valor do Produto</label>
            <div class="input-group">
              <span class="input-group-text">R$</span>
              <input
                type="text"
                class="form-control"
                aria-label="Quantidade Inteira em Reais"
                placeholder="Valor Do Produto"
              />
              <span class="input-group-text">.00</span>
            </div>
          </div>

          <div class="col-md-5">
            <label for="inputAmount" class="form-label">Quantidade</label>
            <input
              type="text"
              class="form-control"
              id="inputAmount"
              placeholder="Quantidade do Produto"
            />
          </div>
        </div>
        <div class="col-md-6">
          <label for="inputCity" class="form-label">Cidade</label>
          <input type="text" class="form-control" id="inputCity" placeholder="Cidade"/>
        </div>
        <div class="col-md-2">
          <label for="inputZip" class="form-label">CEP</label>
          <input type="text" class="form-control" id="inputZip" placeholder="CEP"/>
        </div>
        <div class="form-check">
          <input
            class="form-check-input"
            type="radio"
            name="flexRadioDefault"
            id="flexRadioDefault1"
          />
          <label class="form-check-label" for="flexRadioDefault1">
            São paulo
          </label>
        </div>
        <div class="form-check">
          <input
            class="form-check-input"
            type="radio"
            name="flexRadioDefault"
            id="flexRadioDefault2"
            
          />
          <label class="form-check-label" for="flexRadioDefault2">
            Rio de Janeiro
          </label>
        </div>
        <div class="form-check">
          <input
            class="form-check-input"
            type="radio"
            name="flexRadioDefault"
            id="flexRadioDefault3"
          />
          <label class="form-check-label" for="flexRadioDefault3">
            Minas Gerais
          </label>
        </div>
        <div class="col-12">
          <button type="submit" class="btn btn-primary">
            cadastrar Produto
          </button>
        </div>
      </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
