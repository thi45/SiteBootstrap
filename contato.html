</head>

<div class="container-fluid mt-3">
<h3>Contato</h3>
    <form class="row g-3">
     
      <div class="col-md-7 col-sm-12">
      <div class="form-floating">
      <input type="text" name="nome" id="nome" class="form-control" placeholder="Nome Completo" required>
      <label for="nome">Nome Completo</label>
      </div>
      </div>

      <div class="col-md-5 col-sm-12">
      <div class="form-floating">
      <input type="email" name="e-mail" id="e-mail" class="form-control" placeholder="E-Mail" required>
      <label for="e-mail">E-Mail</label>
      </div>
      </div>

      <div class="col-md-4 col-sm-12">
      <div class="form-floating">
      <input type="password" name="senha" id="senha" class="form-control" placeholder="Senha" required>
      <label for="senha">Senha</label>
      </div>
      </div>

      <div class="col-md-4 col-sm-12">
      <div class="form-floating">
      <input type="date" name="datanasc" id="datanasc" class="form-control">
      <label for="datanasc">Data de Nascimento</label>
      </div>
      </div>

      <div class="col-md-4 col-sm-12">
      <div class="form-floating">
        <select name="categoria" id="categoria" class="form-select" required>
          <option value="" selected disabled>Selecione</option>
          <option value="frontend">Frontend</option>
          <option value="backend">Backend</option>
        </select>
        <label for="categoria">Categoria</label>
      </div>
      </div>

      <div class="col-md-12 col-sm-12">
        <label class="form-label d-block">Tipo</label>
        <div class="form-check form-check-inline">
        <input type="radio" name="tipo" id="aluno" class="form-check-input">
        <label for="aluno" class="form-check-label">Aluno</label>
        </div>

        <div class="form-check form-check-inline">
        <input type="radio" name="tipo" id="professor" class="form-check-input">
        <label for="professor" class="form-check-label">Professor</label>
        </div>
      </div>

      <div class="col-md-4 col-sm-12">
        <div class="form-check">
          <input type="checkbox" name="termos" id="termos" class="form-check-input" required>
          <label for="termos" class="form-check-label">Aceite os Termos</label>
        </div>
      </div>
      <div class="col-12 mb-2">
        <button type="submit" class="btn btn-success">Enviar</button>
          <button type="reset" class="btn btn-warning">Limpar</button>
            <button type="button" class="btn btn-danger">Cancelar</button>
      </div>

    </form>
</div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
